version: '3.8'

services:
  openalpha:
    build: .
    container_name: openalpha-quant
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
